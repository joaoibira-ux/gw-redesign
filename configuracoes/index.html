<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Configurações GW</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>

<header>
  <a href="https://sistema.gwrevestimentos.com.br/" style="display:flex;align-items:center;line-height:0;">
    <img src="../Logo-gw.png" alt="GW" style="height:34px;width:34px;object-fit:contain;border-radius:6px;" />
  </a>
  <span>⚙️ Configurações</span>
  <span id="versao-app" class="header-versao"></span>
</header>

<div id="conteudo" class="conteudo">
  <div class="loading">Carregando...</div>
</div>

<!-- Modal editar -->
<div id="modal-overlay" class="modal-overlay" style="display:none" onclick="fecharModal()">
  <div class="modal-box" onclick="event.stopPropagation()">
    <div class="modal-titulo" id="modal-titulo"></div>
    <input id="modal-input" class="modal-input" type="text" />
    <div class="modal-senha-wrap" id="modal-senha-wrap">
      <label class="modal-senha-label">Senha de autorização</label>
      <input id="modal-senha" class="modal-input" type="password" placeholder="Senha" />
    </div>
    <div id="modal-erro" class="modal-erro"></div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="fecharModal()">Cancelar</button>
      <button class="btn-save" onclick="salvarModal()">Salvar</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="./app.js"></script>
<script src="../pc-confiavel.js"></script>

</body>
</html>
