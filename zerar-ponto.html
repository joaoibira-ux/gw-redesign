<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Zerar dados do Ponto</title>
  <style>
    body { font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 20px; background: #f5f5f5; }
    h2 { color: #c62828; }
    button { background: #c62828; color: white; border: none; padding: 14px 28px; font-size: 1rem; border-radius: 8px; cursor: pointer; margin-top: 16px; }
    button:disabled { background: #aaa; cursor: default; }
    #log { margin-top: 20px; font-size: 0.85rem; line-height: 1.8; color: #333; white-space: pre-wrap; }
    .ok  { color: #2e7d32; }
    .err { color: #c62828; }
  </style>
</head>
<body>
  <h2>⚠️ Zerar dados do Ponto</h2>
  <p>Esta página irá apagar:</p>
  <ul style="margin:12px 0 0 20px;line-height:2">
    <li>Todos os registros de ponto (coleção <code>pontos</code>)</li>
    <li>A localização configurada (<code>config/ponto</code>)</li>
  </ul>
  <p style="margin-top:12px;color:#555">Os rostos cadastrados <strong>não serão apagados</strong>.</p>

  <button id="btn" onclick="executar()">Apagar agora</button>
  <div id="log"></div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script>
    firebase.initializeApp({
      apiKey:            "AIzaSyBaqROPsywPgtKjQU7cs1ke1WaqDFhWwn0",
      authDomain:        "sistema-gw-36566.firebaseapp.com",
      projectId:         "sistema-gw-36566",
      storageBucket:     "sistema-gw-36566.firebasestorage.app",
      messagingSenderId: "472820177992",
      appId:             "1:472820177992:web:2e1b98c9f6ac3a823d0c7d"
    });
    const db = firebase.firestore();

    function log(msg, cls = '') {
      const el = document.getElementById('log');
      const span = document.createElement('span');
      span.className = cls;
      span.textContent = msg + '\n';
      el.appendChild(span);
    }

    async function deletarColecao(colecao) {
      const snap = await db.collection(colecao).get();
      if (snap.empty) { log(`  ${colecao}: nenhum documento encontrado.`); return 0; }
      const batch = db.batch();
      snap.docs.forEach(d => batch.delete(d.ref));
      await batch.commit();
      return snap.size;
    }

    async function executar() {
      const btn = document.getElementById('btn');
      btn.disabled = true;
      document.getElementById('log').innerHTML = '';

      try {
        log('Apagando registros de ponto...');
        const n = await deletarColecao('pontos');
        log(`  ✓ ${n} registro(s) apagado(s).`, 'ok');

        log('Apagando configuração de localização...');
        await db.collection('config').doc('ponto').delete();
        log('  ✓ config/ponto apagado.', 'ok');

        log('\n✅ Concluído! Pode fechar esta página.', 'ok');
      } catch(e) {
        log('❌ Erro: ' + e.message, 'err');
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
