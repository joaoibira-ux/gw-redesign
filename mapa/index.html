<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Mapa" />
  <title>Mapa de Execução</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css?v=29" />
</head>
<body>

<header>
  <a href="https://sistema.gwrevestimentos.com.br/index.html" style="display:flex;align-items:center;line-height:0;">
    <img src="./Logo-gw.png" alt="GW" style="height:34px;width:34px;object-fit:contain;border-radius:6px;" />
  </a>
  <span>Mapa de Execução</span>
  <span id="versao-app" class="header-versao"></span>
</header>

<div class="legenda">
  <span class="leg-item leg-clicavel" onclick="mostrarTotaisConcluidos()"><span class="leg-cor concluido"></span> Concluído</span>
  <span class="leg-item"><span class="leg-cor em_pagamento"></span> Na folha</span>
  <span class="leg-item"><span class="leg-cor pendente"></span> Pendente</span>
</div>

<div id="mapa" class="mapa"></div>

<div id="popup-det" class="popup-det" style="display:none">
  <div class="pop-header">
    <strong>Detalhes</strong>
    <button onclick="fecharInfo()">✕</button>
  </div>
  <div class="pop-body"></div>
</div>

<div id="modal-totais" class="modal-totais" style="display:none" onclick="if(event.target===this) fecharTotais()">
  <div class="modal-totais-card">
    <div class="pop-header">
      <strong>Serviços Concluídos</strong>
      <button onclick="fecharTotais()">✕</button>
    </div>
    <div id="totais-body"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
<script src="./app.js?v=37"></script>
<script src="../agente.js"></script>
<script src="../pc-confiavel.js"></script>
</body>
</html>
