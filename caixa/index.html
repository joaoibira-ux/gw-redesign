<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Caixa" />
  <title>Caixa</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="apple-touch-icon" href="./logo-gw.png.jpeg" />
  <link rel="stylesheet" href="./style.css?v=30" />
  <style>
    html.gw-blocked body > *:not(#aviso-instalacao) { display: none !important; }
    #aviso-instalacao {
      display: none; position: fixed; inset: 0; z-index: 9999;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 24px; gap: 16px; overflow-y: auto;
      background:
        linear-gradient(180deg, rgba(8,20,12,0.6) 0%, rgba(8,20,12,0.85) 100%),
        url('./Logo-gw.png') center/cover no-repeat scroll;
    }
    html.gw-blocked #aviso-instalacao { display: flex; }
    .aviso-card { width: 100%; max-width: 420px; padding: 16px; border-radius: 22px; }
    .aviso-card img { width: 100%; display: block; border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.5); }
    .aviso-card img.aviso-logo {
      width: 50%; margin: 28px auto;
      border-radius: 0; box-shadow: none;
      animation: aviso-logo-fade 1.1s ease-in-out;
    }
    @keyframes aviso-logo-fade {
      0%   { opacity: 0; transform: scale(.9); }
      35%  { opacity: 1; transform: scale(1); }
      100% { opacity: 1; transform: scale(1); }
    }
  </style>
  <script>
    (function() {
      function estaComoApp() {
        return window.navigator.standalone === true
          || window.matchMedia('(display-mode: standalone)').matches
          || window.matchMedia('(display-mode: fullscreen)').matches;
      }
      if (!estaComoApp()) {
        document.documentElement.classList.add('gw-blocked');
      }
    })();
  </script>
</head>
<body>

<!-- Aviso de instalação -->
<div id="aviso-instalacao">
  <div class="aviso-card">
    <img id="aviso-img" src="" alt="Instruções" />
  </div>
</div>

<header>
  <a href="https://sistema.gwrevestimentos.com.br/index.html" style="display:flex;align-items:center;line-height:0;">
    <img src="./Logo-gw.png" alt="GW" style="height:34px;width:34px;object-fit:contain;border-radius:6px;" />
  </a>
  <span>Caixa</span>
  <span id="versao-caixa" class="header-versao"></span>
</header>

<div class="totals">
  <div class="item">
    <div class="label">Entradas</div>
    <div class="value entrada" id="tot-entrada">R$ 0,00</div>
  </div>
  <div class="item">
    <div class="label">Saídas</div>
    <div class="value saida" id="tot-saida">R$ 0,00</div>
  </div>
  <div class="item">
    <div class="label">Saldo</div>
    <div class="value saldo-pos" id="tot-saldo">R$ 0,00</div>
  </div>
</div>
<div class="totals-sub">
  <div class="item">
    <div class="label">CEF (ANE)</div>
    <div class="value saldo-pos" id="tot-cef">R$ 0,00</div>
  </div>
  <div class="item inter-row">
    <div class="label">INTER (JOAO)</div>
    <div class="value saldo-pos" id="tot-inter">R$ 0,00</div>
  </div>
  <div class="item">
    <div class="label">JOÃO ALBÉRICO</div>
    <div class="value saldo-pos" id="tot-joao">R$ 0,00</div>
  </div>
  <div class="item">
    <div class="label">HORÁCIO FORTE</div>
    <div class="value saldo-neg" id="tot-horacio">R$ 0,00</div>
  </div>
  <button class="fab" id="fab" onclick="toggleForm()">+</button>
</div>

<form class="form-card" id="form" novalidate style="display:none">
  <h3>Novo lançamento</h3>
  <div class="form-grid">
    <div>
      <label for="f-data">Data</label>
      <input type="text" id="f-data" placeholder="DD/MM/AAAA" />
    </div>
    <div>
      <label for="f-origem">Origem</label>
      <select id="f-origem">
        <option value="ANE">ANE</option>
        <option value="JOAO">JOAO</option>
        <option value="ANE->GW-INTER">ANE → GW-INTER</option>
        <option value="ANE->HORACIO">ANE → HORACIO</option>
        <option value="ANE->JOAO">ANE → JOAO</option>
        <option value="JOAO->HORACIO">JOÃO → HORÁCIO</option>
        <option value="ANE->RETENCAO PARADIGMA 5%">ANE → RETENÇÃO PARADIGMA 5%</option>
        <option value="JOAO->RETENCAO PARADIGMA 5%">JOAO → RETENÇÃO PARADIGMA 5%</option>
        <option value="ANE->FOLHA DE PAGAMENTO">ANE → FOLHA DE PAGAMENTO</option>
        <option value="ANE->ADIANTAMENTO">ANE → ADIANTAMENTO</option>
        <option value="JOAO->CREDITO DE PROLABORE">JOAO → CRÉDITO DE PRÓ-LABORE</option>
        <option value="JOAO->JOAO">JOÃO → JOÃO</option>
        <option value="JOAO->CTAS A RECEBER">JOÃO → CTAS A RECEBER</option>
        <option value="JOAO->BAIXA CTAS A RECEBER">JOÃO → BAIXA CTAS A RECEBER</option>
        <option value="JOAO->CTAS A PAGAR">JOÃO → CTAS A PAGAR</option>
        <option value="JOAO->BAIXA CTAS A PAGAR">JOÃO → BAIXA CTAS A PAGAR</option>
        <option value="ANE->CREDITO A REPASSAR P BBS FOMENTO">ANE → CRÉDITO A REPASSAR P/ BBS FOMENTO</option>
      </select>
    </div>
    <div class="full">
      <label for="f-desc">Descrição</label>
      <input type="text" id="f-desc" placeholder="Ex: Compra mercado" />
    </div>
    <div>
      <label for="f-entrada">Entrada (R$)</label>
      <input type="decimal" inputmode="decimal" id="f-entrada" placeholder="0,00" />
    </div>
    <div>
      <label for="f-saida">Saída (R$)</label>
      <input type="decimal" inputmode="decimal" id="f-saida" placeholder="0,00" />
    </div>
    <button type="submit" class="btn-add">+ Adicionar</button>
  </div>
</form>


<p class="section-title">Lançamentos</p>
<div class="lancamentos" id="lista" style="padding-bottom: env(safe-area-inset-bottom)"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<div class="modal-overlay" id="picker-overlay">
  <div class="modal">
    <h3 id="picker-titulo" style="color:#1565c0;margin-bottom:12px">Adiantamento — Funcionário</h3>
    <div id="picker-lista" style="max-height:300px;overflow-y:auto;border-radius:8px;border:1px solid #e0e0e0;margin-bottom:14px"></div>
    <div class="modal-btns">
      <button class="btn-cancelar" onclick="fecharPicker()">Cancelar</button>
    </div>
  </div>
</div>

<script src="./app.js?v=64"></script>
<script>
  if (document.documentElement.classList.contains('gw-blocked')) {
    (function() {
      const isIOS     = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
      const isAndroid = /Android/.test(navigator.userAgent);
      const img = document.getElementById('aviso-img');
      let destino;
      if (isIOS)          destino = './Aviso iPhone.png';
      else if (isAndroid) destino = './Aviso Adroide.png';
      else                destino = './instrucoes_sistema_gw.png';
      img.src = './Logo-gw.png';
      img.classList.add('aviso-logo');
      setTimeout(() => {
        img.classList.remove('aviso-logo');
        img.src = destino;
      }, 1200);
    })();
  }
</script>
</body>
</html>
