<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="A Pagar" />
  <title>A Pagar</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css?v=3" />
  <link rel="apple-touch-icon" href="./Logo-gw.png" />
</head>
<body>

<header>
  <a href="https://sistema.gwrevestimentos.com.br/index.html" style="display:flex;align-items:center;line-height:0;">
    <img src="./Logo-gw.png" alt="GW" style="height:34px;width:34px;object-fit:contain;border-radius:6px;" />
  </a>
  <span>A Pagar</span>
  <button class="btn-somar" id="btn-somar" onclick="toggleSoma()">Somar</button>
  <span id="versao-app" class="header-versao"></span>
</header>

<div class="resumo">
  <span class="resumo-label" id="resumo-label">Total em aberto</span>
  <span class="resumo-valor" id="tot-aberto">R$ 0,00</span>
</div>

<div id="lista" class="lista"></div>

<button class="fab" id="fab" onclick="toggleForm()">+</button>

<div class="detalhe-overlay" id="detalhe-overlay" style="display:none" onclick="if(event.target===this) fecharDetalhe()">
  <div class="detalhe-box">
    <div class="detalhe-top">
      <span class="detalhe-badge" id="det-badge"></span>
      <button class="detalhe-fechar" onclick="fecharDetalhe()">✕</button>
    </div>
    <div class="detalhe-desc" id="det-desc"></div>
    <div class="detalhe-valor" id="det-valor"></div>
    <div class="detalhe-linhas" id="det-linhas"></div>
    <div class="detalhe-botoes">
      <button class="btn-cancelar" onclick="cancelarDaTelaDetalhe()">Cancelar</button>
      <button class="btn-editar-detalhe" onclick="editarDaTelaDetalhe()">Editar</button>
    </div>
  </div>
</div>

<form class="form-card" id="form" novalidate style="display:none">
  <h3 id="form-titulo">Nova Conta a Pagar</h3>
  <div class="form-grid">
    <div class="full">
      <label for="f-data">Data</label>
      <input type="text" id="f-data" placeholder="DD/MM/AAAA" />
    </div>
    <div class="full">
      <label for="f-desc">Descrição</label>
      <input type="text" id="f-desc" placeholder="Ex: Empréstimo de fornecedor X" />
    </div>
    <div class="full">
      <label for="f-valor">Valor (R$)</label>
      <input type="decimal" inputmode="decimal" id="f-valor" placeholder="0,00" />
    </div>
    <button type="submit" class="btn-add" id="btn-add">+ Cadastrar</button>
  </div>
</form>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
<script src="./app.js?v=4"></script>
<script src="../agente.js"></script>
</body>
</html>
