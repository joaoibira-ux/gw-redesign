<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Medições" />
  <title>Medições</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./style.css?v=3" />
  <link rel="apple-touch-icon" href="./Logo-gw.png" />
</head>
<body>

<header>
  <a href="https://sistema.gwrevestimentos.com.br/index.html" style="display:flex;align-items:center;line-height:0;">
    <img src="./Logo-gw.png" alt="GW" style="height:34px;width:34px;object-fit:contain;border-radius:6px;" />
  </a>
  <span>Medições</span>
  <span id="versao-app" class="header-versao"></span>
</header>

<div class="resumo">
  <span class="resumo-label">Total medido</span>
  <span class="resumo-valor" id="tot-medido">R$ 0,00</span>
</div>

<div id="lista" class="lista"></div>

<button class="fab" id="fab" onclick="abrirSeletorFoto()">+</button>
<input type="file" id="input-foto" accept="image/*" style="display:none" />

<div class="overlay-loading" id="overlay-loading" style="display:none">
  <div class="spinner"></div>
  <p>Analisando planilha...</p>
</div>

<div class="overlay-revisao" id="overlay-revisao" style="display:none">
  <div class="revisao-card">
    <h3>Nova Medição</h3>
    <p class="revisao-sub">Confira os valores e dê um nome pra essa medição.</p>

    <div class="full">
      <label for="rv-nome">Nome da Medição</label>
      <input type="text" id="rv-nome" placeholder="Ex: Medição 01 - Junho/2026" />
    </div>
    <div class="full">
      <label for="rv-data">Data</label>
      <input type="text" id="rv-data" placeholder="DD/MM/AAAA" />
    </div>
    <div class="full">
      <label for="rv-valor">Valor Medido (R$)</label>
      <input type="text" inputmode="decimal" id="rv-valor" />
    </div>
    <div class="full">
      <label for="rv-descontos">Descontos (R$)</label>
      <input type="text" inputmode="decimal" id="rv-descontos" />
    </div>
    <div class="full">
      <label for="rv-notafiscal">Valor Nota Fiscal (R$)</label>
      <input type="text" inputmode="decimal" id="rv-notafiscal" />
    </div>

    <p class="revisao-sub">Itens identificados</p>
    <div id="revisao-lista"></div>

    <button type="button" class="btn-add-linha" onclick="adicionarLinhaRevisao()">+ Adicionar item</button>

    <div class="revisao-acoes">
      <button type="button" class="btn-cancelar" onclick="cancelarRevisao()">Cancelar</button>
      <button type="button" class="btn-add" onclick="salvarRevisao()">Salvar Medição</button>
    </div>
  </div>
</div>

<div class="overlay-revisao" id="overlay-detalhe" style="display:none">
  <div class="revisao-card">
    <h3>Detalhes da Medição</h3>

    <div class="dt-row">
      <div style="flex:2">
        <label class="dt-label" for="dt-nome">Nome</label>
        <input type="text" id="dt-nome" class="dt-input" />
      </div>
      <div style="flex:1">
        <label class="dt-label" for="dt-data">Data</label>
        <input type="text" id="dt-data" class="dt-input" placeholder="DD/MM/AAAA" />
      </div>
    </div>

    <div class="dt-row">
      <div style="flex:1">
        <label class="dt-label" for="dt-valor">Medido (R$)</label>
        <input type="text" inputmode="decimal" id="dt-valor" class="dt-input" />
      </div>
      <div style="flex:1">
        <label class="dt-label" for="dt-descontos">Descontos (R$)</label>
        <input type="text" inputmode="decimal" id="dt-descontos" class="dt-input" />
      </div>
    </div>

    <div class="dt-row">
      <div style="flex:1">
        <label class="dt-label" for="dt-notafiscal">A Pagar (R$)</label>
        <input type="text" inputmode="decimal" id="dt-notafiscal" class="dt-input" />
      </div>
      <div style="flex:1"></div>
    </div>

    <div class="dt-info-grid" id="dt-info-grid"></div>

    <p class="revisao-sub" style="margin-top:12px;margin-bottom:6px">Itens</p>
    <div id="detalhe-itens"></div>

    <button type="button" id="btn-ver-foto" class="btn-add-linha" style="margin-top:8px;display:none">Ver Foto Original</button>

    <div class="revisao-acoes">
      <button type="button" class="btn-cancelar" onclick="excluirMedicaoAtual()">Excluir</button>
      <button type="button" class="btn-add" onclick="salvarDetalhe()">Salvar</button>
    </div>
    <button type="button" class="btn-add-linha" style="margin-top:10px" onclick="fecharDetalhe()">Fechar</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-functions-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="./app.js?v=2.7"></script>
<script src="../agente.js"></script>
<script src="../pc-confiavel.js"></script>
<script src="../bfcache-fix.js"></script>
</body>
</html>
